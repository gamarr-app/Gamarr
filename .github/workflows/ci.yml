name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22.x'

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: _output/UI
          retention-days: 1

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Disable internet
        run: |
          sudo iptables -I OUTPUT -d 127.0.0.0/8 -j ACCEPT
          sudo iptables -I OUTPUT -o lo -j ACCEPT
          sudo iptables -A OUTPUT -m state --state NEW -j REJECT

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Re-enable internet
        if: always()
        run: sudo iptables -D OUTPUT -m state --state NEW -j REJECT

  unit-test-linux:
    name: Unit Tests (Linux ${{ matrix.shard }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: core-1
            projects: src/NzbDrone.Core.Test/Gamarr.Core.Test.csproj
            filter: "Category!=IntegrationTest&Category!=ExternalIntegrationTest&Category!=AutomationTest&(FullyQualifiedName~NzbDrone.Core.Test.Datastore|FullyQualifiedName~NzbDrone.Core.Test.DecisionEngine|FullyQualifiedName~NzbDrone.Core.Test.Download|FullyQualifiedName~NzbDrone.Core.Test.MediaFiles|FullyQualifiedName~NzbDrone.Core.Test.ParserTests|FullyQualifiedName~NzbDrone.Core.Test.IndexerTests|FullyQualifiedName~NzbDrone.Core.Test.Indexers|FullyQualifiedName~NzbDrone.Core.Test.InstrumentationTests|FullyQualifiedName~NzbDrone.Core.Test.GameTests|FullyQualifiedName~NzbDrone.Core.Test.Blocklisting|FullyQualifiedName~NzbDrone.Core.Test.Games|FullyQualifiedName~NzbDrone.Core.Test.OrganizerTests|FullyQualifiedName~NzbDrone.Core.Test.ProviderTests)"
          - shard: core-2
            projects: src/NzbDrone.Core.Test/Gamarr.Core.Test.csproj
            filter: "Category!=IntegrationTest&Category!=ExternalIntegrationTest&Category!=AutomationTest&FullyQualifiedName!~NzbDrone.Core.Test.Datastore&FullyQualifiedName!~NzbDrone.Core.Test.DecisionEngine&FullyQualifiedName!~NzbDrone.Core.Test.Download&FullyQualifiedName!~NzbDrone.Core.Test.MediaFiles&FullyQualifiedName!~NzbDrone.Core.Test.ParserTests&FullyQualifiedName!~NzbDrone.Core.Test.IndexerTests&FullyQualifiedName!~NzbDrone.Core.Test.Indexers&FullyQualifiedName!~NzbDrone.Core.Test.InstrumentationTests&FullyQualifiedName!~NzbDrone.Core.Test.GameTests&FullyQualifiedName!~NzbDrone.Core.Test.Blocklisting&FullyQualifiedName!~NzbDrone.Core.Test.Games&FullyQualifiedName!~NzbDrone.Core.Test.OrganizerTests&FullyQualifiedName!~NzbDrone.Core.Test.ProviderTests"
          - shard: other
            projects: src/NzbDrone.Common.Test/Gamarr.Common.Test.csproj src/NzbDrone.Host.Test/Gamarr.Host.Test.csproj src/NzbDrone.Api.Test/Gamarr.Api.Test.csproj src/NzbDrone.Libraries.Test/Gamarr.Libraries.Test.csproj src/NzbDrone.Update.Test/Gamarr.Update.Test.csproj src/NzbDrone.Mono.Test/Gamarr.Mono.Test.csproj src/NzbDrone.Windows.Test/Gamarr.Windows.Test.csproj
            filter: "Category!=IntegrationTest&Category!=ExternalIntegrationTest&Category!=AutomationTest"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: Linux-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: Linux-nuget-

      - name: Build
        run: dotnet build src/Gamarr.sln --configuration Debug

      - name: Run Unit Tests
        shell: bash
        run: |
          for project in ${{ matrix.projects }}; do
            dotnet test "$project" \
              --no-build \
              --configuration Debug \
              --filter "${{ matrix.filter }}" \
              --logger "trx;LogFileName=test-results-$(basename $project .csproj).trx" \
              --results-directory ./test-results
          done

      - name: Verify tests ran
        if: always()
        shell: bash
        run: |
          if [ -z "$(ls ./test-results/*.trx 2>/dev/null)" ]; then
            echo "::error::No test results found - tests did not run"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results-linux-${{ matrix.shard }}
          path: ./test-results
          retention-days: 7

  unit-test-other:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.nuget/packages
            ~/AppData/Local/NuGet/Cache
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build src/Gamarr.sln --configuration Debug

      - name: Run Unit Tests
        shell: bash
        run: |
          dotnet test src/Gamarr.sln \
            --no-build \
            --configuration Debug \
            --filter "Category!=IntegrationTest&Category!=ExternalIntegrationTest&Category!=AutomationTest" \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results

      - name: Verify tests ran
        if: always()
        shell: bash
        run: |
          if [ ! -f ./test-results/test-results.trx ]; then
            echo "::error::No test results found - tests did not run"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results-${{ matrix.os }}
          path: ./test-results
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: Linux-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: Linux-nuget-

      - name: Build
        run: dotnet build src/Gamarr.sln --configuration Debug

      - name: Disable internet
        run: |
          sudo iptables -I OUTPUT -d 127.0.0.0/8 -j ACCEPT
          sudo iptables -I OUTPUT -o lo -j ACCEPT
          sudo iptables -A OUTPUT -m state --state NEW -j REJECT

      - name: Run Integration Tests
        shell: bash
        run: |
          dotnet test src/Gamarr.sln \
            --no-build \
            --configuration Debug \
            --filter "Category=IntegrationTest" \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --results-directory ./test-results

      - name: Re-enable internet
        if: always()
        run: sudo iptables -D OUTPUT -m state --state NEW -j REJECT

      - name: Run External Integration Tests
        shell: bash
        run: |
          dotnet test src/Gamarr.sln \
            --no-build \
            --configuration Debug \
            --filter "Category=ExternalIntegrationTest" \
            --logger "trx;LogFileName=external-integration-test-results.trx" \
            --results-directory ./test-results

      - name: Verify tests ran
        if: always()
        shell: bash
        run: |
          if [ ! -f ./test-results/integration-test-results.trx ]; then
            echo "::error::No test results found - tests did not run"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results
          path: ./test-results
          retention-days: 7

  automation-test:
    name: Automation Tests
    runs-on: ubuntu-24.04
    needs: frontend-build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: Linux-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: Linux-nuget-

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: _output/UI

      - name: Build backend
        run: dotnet build src/Gamarr.sln --configuration Debug

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('src/NzbDrone.Automation.Test/Gamarr.Automation.Test.csproj') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh _tests/net8.0/playwright.ps1 install --with-deps

      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pwsh _tests/net8.0/playwright.ps1 install-deps

      - name: Disable internet
        run: |
          sudo iptables -I OUTPUT -d 127.0.0.0/8 -j ACCEPT
          sudo iptables -I OUTPUT -o lo -j ACCEPT
          sudo iptables -A OUTPUT -m state --state NEW -j REJECT

      - name: Run Automation Tests
        run: |
          dotnet test src/NzbDrone.Automation.Test/Gamarr.Automation.Test.csproj \
            --no-build \
            --configuration Debug \
            --filter "Category=AutomationTest&Category!=ExternalAutomationTest" \
            --logger "trx;LogFileName=automation-test-results.trx" \
            --results-directory ./test-results

      - name: Re-enable internet
        if: always()
        run: sudo iptables -D OUTPUT -m state --state NEW -j REJECT

      - name: Run External Automation Tests
        run: |
          dotnet test src/NzbDrone.Automation.Test/Gamarr.Automation.Test.csproj \
            --no-build \
            --configuration Debug \
            --filter "Category=ExternalAutomationTest" \
            --logger "trx;LogFileName=external-automation-test-results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: automation-test-results
          path: ./test-results
          retention-days: 7

      - name: Upload error screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: automation-test-screenshots
          path: ./*_screenshot.png
          retention-days: 7

  build-complete:
    name: Build Complete
    runs-on: ubuntu-24.04
    needs: [frontend-build, frontend-test, unit-test-linux, unit-test-other, integration-test, automation-test]
    if: always()
    steps:
      - name: Check build status
        run: |
          failed=false
          for result in "${{ needs.frontend-build.result }}" "${{ needs.frontend-test.result }}" "${{ needs.unit-test-linux.result }}" "${{ needs.integration-test.result }}" "${{ needs.automation-test.result }}"; do
            if [[ "$result" == "failure" ]]; then
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs completed successfully"
