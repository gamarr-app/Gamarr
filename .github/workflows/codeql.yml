name: CodeQL

# Advanced setup replacing GitHub's default setup, which broke on 2026-07-05
# when contrib/playnite (net462) landed: the buildless C# extractor restored
# the .NET Framework targeting pack and the merged compilation model could no
# longer process any source. Default setup cannot exclude paths; this
# workflow ignores contrib/ entirely.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '24 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: csharp
          - language: javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config: |
            paths-ignore:
              - contrib

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
